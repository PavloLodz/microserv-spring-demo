spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: orders_user
    password: ${ORDERS_DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

  task:
    scheduling:
      pool:
        size: 2

server:
  port: 8080

outbox:
  poll-interval-ms: 5000
  # Maximum number of Kafka publish attempts before a row is transitioned to FAILED.
  # Poison-pill events (e.g. unroutable topics, permanently unserializable payloads)
  # are quarantined after this many retries so they no longer block the poll cycle.
  max-retry: 5
  # Maximum number of PENDING rows loaded per poll cycle.
  # Caps memory usage under backlog conditions; the next cycle drains remaining rows.
  poll-batch-size: 100

idempotency:
  ttl-hours: 24
  cleanup-cron: "0 0 * * * *"
